<!--
  ═══════════════════════════════════════════════════════════════
  NxTGen Journal — Auth Guard + Logout Button
  
  INSTRUCTIONS:
  1. Paste the <script> block at the VERY BOTTOM of index.html,
     just before the closing </body> tag.
  2. Paste the logout button HTML wherever you want it to appear
     in your dashboard (e.g. top-right header area).
  ═══════════════════════════════════════════════════════════════
-->


<!-- ── STEP 1: Paste this button in your header/navbar ── -->
<div id="nxtgen-user-bar" style="
  display:flex; align-items:center; gap:12px;
  font-family:'Space Grotesk',sans-serif;
">
  <span id="nxtgen-user-name" style="
    font-size:13px; color:#8899aa;
    font-family:'JetBrains Mono',monospace;
  "></span>
  <button id="nxtgen-logout-btn" onclick="handleLogout()" style="
    padding:7px 16px;
    background:rgba(252,129,129,0.1);
    border:1px solid rgba(252,129,129,0.25);
    border-radius:8px;
    font-family:'Space Grotesk',sans-serif;
    font-size:12px; font-weight:600;
    color:#fc8181; cursor:pointer;
    transition:background 0.2s, color 0.2s;
  "
  onmouseover="this.style.background='rgba(252,129,129,0.2)'"
  onmouseout="this.style.background='rgba(252,129,129,0.1)'">
    Sign Out
  </button>
</div>


<!-- ── STEP 2: Paste this script block just before </body> ── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  /* Auth guard — redirects to login if no session */
  const SUPABASE_URL  = 'https://jlqgdwfbwdiieafhwisy.supabase.co';
  const SUPABASE_ANON = 'PASTE_YOUR_FULL_PUBLISHABLE_KEY_HERE'; // same key as login.html
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  (async () => {
    const { data: { session } } = await sb.auth.getSession();

    if (!session) {
      /* Not logged in — boot to login page */
      window.location.replace('./login.html');
      return;
    }

    /* Show the user's name or email in the bar */
    const user = session.user;
    const displayName = user.user_metadata?.full_name || user.email;
    const nameEl = document.getElementById('nxtgen-user-name');
    if (nameEl) nameEl.textContent = '👤 ' + displayName;
  })();

  /* Also redirect if they sign out in another tab */
  sb.auth.onAuthStateChange((event) => {
    if (event === 'SIGNED_OUT') window.location.replace('./login.html');
  });

  async function handleLogout() {
    const btn = document.getElementById('nxtgen-logout-btn');
    btn.textContent = 'Signing out…';
    btn.disabled = true;
    await sb.auth.signOut();
    window.location.replace('./login.html');
  }
</script>
