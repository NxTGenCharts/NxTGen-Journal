<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Backtest Lab — Chart Engine Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base:#080b12; --bg2:rgba(13,17,26,0.94); --glass-1:rgba(255,255,255,0.04);
    --glass-2:rgba(255,255,255,0.07); --glass-border:rgba(255,255,255,0.08);
    --blue:#60a5fa; --text:rgba(248,250,252,0.95); --text2:rgba(148,163,184,0.82);
  }
  * { box-sizing: border-box; }
  body { margin:0; background:#04060a; color:var(--text); font-family:"Plus Jakarta Sans",sans-serif; padding:24px; }
  h1 { font-size:15px; font-weight:600; color:var(--text2); margin:0 0 14px; }
  .stage { height: 82vh; }
</style>
<link rel="stylesheet" href="backtest-lab.css">
</head>
<body>
  <h1>Backtesting Lab — Chart + Drawing Tools + Order Simulator (Phase 1+2 demo, synthetic data)</h1>
  <div class="stage">
    <div class="bl-root" id="bl-root">
      <div class="bl-topbar" id="bl-topbar"></div>
      <div class="bl-body" id="bl-body">
        <div id="bl-toolbar-slot"></div>
        <div class="bl-chart-wrap" id="bl-chart-wrap"></div>
      </div>
      <div id="bl-account-slot"></div>
    </div>
  </div>

<script src="chart-engine.js"></script>
<script src="drawing-tools.js"></script>
<script src="order-simulator.js"></script>
<script src="order-ui.js"></script>
<script src="backtest-ui.js"></script>
<script>
  const root = document.getElementById('bl-root');
  const topbar = document.getElementById('bl-topbar');
  const body = document.getElementById('bl-body');
  const chartWrap = document.getElementById('bl-chart-wrap');

  let currentSymbol = 'EURUSD', currentTF = '1H';
  const chart = new ChartEngine(chartWrap);
  chart.setData(generateCandles(currentSymbol, currentTF, 400));

  const tools = new DrawingToolsLayer(chart);
  new DrawToolbar(document.getElementById('bl-toolbar-slot'), tools);
  new PropertyPanel(chartWrap, tools);

  const account = new TradingAccount(100000);
  const replay = new ReplayEngine(chart, chartWrap, {
    onTick: (cursor) => {
      // feed the newly-revealed candle to the simulator so pending orders /
      // SL / TP can trigger — this is what makes replay + trading connect.
      const candle = chart.data[cursor - 1];
      account.tick(candle);
    }
  });

  const orderLines = new OrderLinesLayer(chart, account, () => currentSymbol);
  const orderPanel = new OrderPanel(topbar, account, () => (chart.data[replay.cursor - 1] || {}).c ?? null);
  orderPanel.setSymbol(currentSymbol);
  new AccountBar(document.getElementById('bl-account-slot'), account, () => (chart.data[replay.cursor - 1] || {}).c ?? null);

  account.onPositionClosed = (trade) => {
    // TODO (Phase 3): push `trade` into your existing trades table the same
    // way the manual trade simulator already does — same shape, new source.
    console.log('Trade closed → journal sync stub:', trade);
  };

  new SymbolSearch(topbar, (sym) => {
    currentSymbol = sym;
    orderPanel.setSymbol(sym);
    chart.setData(generateCandles(currentSymbol, currentTF, 400));
    replay.slider.max = chart.data.length;
    replay.seek(chart.data.length);
  });
  new TimeframeSelector(topbar, (tf) => {
    currentTF = tf;
    chart.setData(generateCandles(currentSymbol, currentTF, 400));
    replay.slider.max = chart.data.length;
    replay.seek(chart.data.length);
  }, currentTF);

  chart.onCrosshair = (candle) => { /* hook for an OHLC readout label if desired */ };
</script>
</body>
</html>
